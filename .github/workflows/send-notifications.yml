name: Send Deadline Notifications

on:
  schedule:
    - cron: '37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: send-notifications
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python scripts/send_notifications.py
        env:
          ONESIGNAL_APP_ID: f2acf5a5-1a22-4313-8c55-58251657a7fe
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}

      - name: Commit state if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add state/notifications-sent.json
          if git diff --cached --quiet; then
            echo "no state changes"
            exit 0
          fi
          git commit -m "chore: update notifications-sent.json"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying"
            sleep 5
          done
          exit 1
