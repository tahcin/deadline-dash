name: Sync IIMBx Deadlines

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-deadlines
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python scripts/sync_deadlines.py
        env:
          IIMBX_EMAIL: ${{ secrets.IIMBX_EMAIL }}
          IIMBX_PASSWORD: ${{ secrets.IIMBX_PASSWORD }}

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/deadlines.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: sync deadlines.json"
            git push
          fi
